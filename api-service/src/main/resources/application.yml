server:
  port: 8080

spring:
  application:
    name: api-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        spring.json.add.type.headers: false

appointments:
  topic-name: ${APPOINTMENTS_TOPIC_NAME:appointments}
  data-service-base-url: ${APPOINTMENTS_DATA_SERVICE_BASE_URL:http://localhost:8081}
